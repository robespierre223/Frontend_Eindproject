<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ploegen</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <!-- Left visual panel -->
  <div class="visual">
    <div class="visual-bg"></div>
    <div class="visual-grain"></div>
    <div class="accent-orb orb-1"></div>
    <div class="accent-orb orb-2"></div>

    <svg class="visual-svg" viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="300" cy="400" r="280" stroke="#c4873c" stroke-width="0.6"/>
      <circle cx="300" cy="400" r="220" stroke="#c4873c" stroke-width="0.4"/>
      <circle cx="300" cy="400" r="160" stroke="#c4873c" stroke-width="0.3"/>
      <line x1="0" y1="400" x2="600" y2="400" stroke="#c4873c" stroke-width="0.4"/>
      <line x1="300" y1="0" x2="300" y2="800" stroke="#c4873c" stroke-width="0.4"/>
      <line x1="0" y1="0" x2="600" y2="800" stroke="#c4873c" stroke-width="0.3"/>
      <line x1="600" y1="0" x2="0" y2="800" stroke="#c4873c" stroke-width="0.3"/>
    </svg>

    <div class="visual-text">
      <div class="brand-name">De<br/><em>ploegen.</em></div>
    </div>
  </div>

  <!-- Right content panel -->
  <div class="content-panel">
    <div class="corner-deco"></div>

    <div class="page-header">
      <p class="page-eyebrow">Overzicht</p>
      <h1 class="page-title">Alle <em>ploegen</em></h1>
      <p class="page-subtitle">Bekijk en beheer de geregistreerde ploegen.</p>
    </div>


    <p class="team-count" id="teamCount"></p>

    <div class="teams-grid" id="teams-container">
      <div class="loading-state">
        <div class="spinner"></div>
        <p class="loading-text">Ploegen laden…</p>
      </div>
    </div>

    <div class="empty-state" id="emptyState">
      <p>Geen ploegen gevonden<em>.</em></p>
      <span>Probeer een andere zoekterm</span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
